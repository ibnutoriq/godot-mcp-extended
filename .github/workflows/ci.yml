name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build + integration tests (Godot ${{ matrix.godot }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        godot: ['4.3.0', '4.4.1']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Godot ${{ matrix.godot }}
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ matrix.godot }}
          use-dotnet: false
          include-templates: false

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run integration tests
        run: node test/integration.test.mjs
        env:
          # setup-godot puts the binary on PATH as `godot`; the server also
          # auto-detects it, but set GODOT_PATH explicitly for determinism.
          GODOT_PATH: godot
